<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporada Fácil - Aluguéis por Temporada</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- HEADER FIXO -->
<header class="header">
    <div class="logo">🏡 Temporada Fácil</div>
    <nav>
        <a href="#destaques">Destaques</a>
        <a href="#tipos">Tipos</a>
        <a href="#contato">Contato</a>
    </nav>
</header>

<!-- BANNER MODERNO -->
<section class="banner">
    <div class="overlay"></div>
    <div class="banner-content">
        <h1>Seu destino perfeito começa aqui</h1>
        <p>Hotéis, pousadas, ranchos e casas disponíveis para sua estadia.</p>
    </div>
</section>

<!-- DESTAQUES -->
<section id="destaques" class="cards-container">
    <h2 class="titulo">Imóveis em Destaque</h2>
    <div class="cards" id="listaImoveis"></div>
</section>

<!-- TIPOS -->
<section id="tipos" class="tipos">
    <h2 class="titulo">Tipos de Hospedagem</h2>

    <div class="tipos-grid">
        <div class="tipo">🏨 Hotéis</div>
        <div class="tipo">🏡 Casas</div>
        <div class="tipo">🌄 Ranchos</div>
        <div class="tipo">🛏 Pousadas</div>
    </div>
</section>

<!-- FOOTER -->
<footer id="contato">
    <h3>Contato</h3>
    <p>WhatsApp: (37) 99918-0702</p>
</footer>

<!-- BOTÃO FIXO WHATSAPP -->
<a href="https://wa.me/5537999180702" class="whatsapp" target="_blank">💬</a>

<script src="script.js"></script>
</body>
</html>
